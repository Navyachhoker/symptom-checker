services:

  - type: web
    name: medtriage-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medtriage-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: web
    name: medtriage-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20.18.0"

databases:
  - name: medtriage-db
    databaseName: triage_db
    plan: free